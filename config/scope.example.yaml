# Exemplo de scope.yaml para um engagement kri0k (schema v1).
#
# Phase 4 (Act + TTP Whois) consome:
#   - version: 1 (mandatorio)
#   - targets: lista exata de dominios (allowlist exact-match per D-48)
#   - safeguards.propose_only: gate executar vs propor (D-49 default true)
#
# Os demais campos (targets_cidr, targets_wildcards, rate_limits.global_rps, audit_path)
# sao parseados mas nao consumidos ainda -- virao em Phase 7 (scope completo) e
# Phase 8 (audit log real).

version: 1
operator: operator@example.com
objective: "recon basico em dominios de exemplo"
targets:
  - example.com
targets_cidr: []
targets_wildcards: []
safeguards:
  propose_only: true
  kill_switch: false
rate_limits:
  global_rps: null
audit_path: null
metadata:
  engagement_id: ENGAGE-2026-001
  client: Example Corp
  authorized_by: security-team@example.com
llm:
  model: deepseek-r1:32b
