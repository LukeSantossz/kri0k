name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  # Allow PyO3 to build with Python 3.14 (newer than officially supported)
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1

jobs:
  # Rust checks
  rust-check:
    name: Rust / ${{ matrix.toolchain }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        toolchain: [stable, beta]
        exclude:
          # Run beta only on Ubuntu for speed
          - os: windows-latest
            toolchain: beta
          - os: macos-latest
            toolchain: beta
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (for PyO3)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings
      
      - name: Build
        run: cargo build --all-features --verbose
      
      - name: Run tests
        run: cargo test --all-features --verbose
      
      - name: Run doctests
        run: cargo test --doc --all-features

  # Python checks
  python-check:
    name: Python / ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]
        exclude:
          # Run 3.12 only on Ubuntu for speed
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Rust (for maturin)
        uses: dtolnay/rust-toolchain@stable
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin ruff mypy pytest pytest-cov
          pip install -e .[dev]
      
      - name: Ruff lint
        run: ruff check python/kri0k tests
      
      - name: Ruff format check
        run: ruff format --check python/kri0k tests
      
      - name: Mypy type check
        run: mypy python/kri0k
      
      - name: Run pytest (unit)
        run: pytest -m unit --cov=kri0k --cov-report=xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: python-${{ matrix.python-version }}

  # Integration tests (Rust ↔ Python)
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [rust-check, python-check]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest
          pip install -e .[dev]
      
      - name: Build Rust extension
        run: maturin develop --release
      
      - name: Run integration tests
        run: pytest -m integration -v
      
      - name: Run graph fixture tests
        run: pytest -m graph -v

  # MSRV check (Minimum Supported Rust Version)
  msrv:
    name: MSRV (Rust 1.75.0)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (for PyO3)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust 1.75.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.75.0"

      - name: Check build
        run: cargo check --all-features

  # Security audit
  security:
    name: Security audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Audit Rust dependencies
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies and pip-audit
        run: |
          pip install pip-audit
          pip install -e . || true

      - name: Audit Python dependencies
        run: pip-audit --requirement pyproject.toml || pip-audit
